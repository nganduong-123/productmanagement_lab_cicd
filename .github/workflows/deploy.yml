name: CI Build Spring Boot App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Copy Jar
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Show workspace
        run: |
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          ls -la

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # Cap quyen thuc thi cho file mvn
      - name: Ensure mvnw executable
        run: |
          cd ${{ github.workspace }}
          chmod +x mvnw

      # Build NGAY TRONG workspace cua runner
      - name: Build with Maven
        working-directory: ${{ github.workspace }}
        run: ./mvnw -B clean package -DskipTests

      - name: List built artifacts
        run: ls -lh ${{ github.workspace }}/target

      # Copy .jar sang cho ban muon chay app
      - name: Copy jar to run directory
        run: |
          cp ${{ github.workspace }}/target/*.jar \
             /home/ubuntu4/product_project/product_source/product-management.jar
          chown ubuntu4:ubuntu4 /home/ubuntu4/product_project/product_source/product-management.jar

  deploy:
    name: Deploy Project
    runs-on: self-hosted
    needs: build

    steps:
      - name: Restart product-app service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart product-app
          sudo systemctl status product-app --no-pager
